name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: bash -n gdrive-sync.sh

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'gdrive-sync.sh'

      - name: Run test suite
        run: |
          mkdir -p tests
          cp test_gdrive_sync.sh tests/
          bash tests/test_gdrive_sync.sh
