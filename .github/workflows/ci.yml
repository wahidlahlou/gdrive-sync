name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check bash syntax
        run: bash -n gdrive-sync.sh

      - name: Run shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck gdrive-sync.sh || true

      - name: Run test suite
        run: |
          mkdir -p tests
          cp test_gdrive_sync.sh tests/
          bash tests/test_gdrive_sync.sh
